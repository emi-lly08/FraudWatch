<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quizzes - FraudWatch</title>

    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-danger">

    <a class="navbar-brand" href="/">
        FraudWatch
    </a>

    <button class="navbar-toggler"
            type="button"
            data-toggle="collapse"
            data-target="#navbarNav">

        <span class="navbar-toggler-icon"></span>

    </button>

    <div class="collapse navbar-collapse"
         id="navbarNav">

        <ul class="navbar-nav">

            <li class="nav-item">
                <a class="nav-link text-light" href="/">
                    Home
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link text-light" href="/golpedigital/">
                    Golpes
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link text-light" href="/linksuspeito/">
                    Links
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link text-light" href="/mensagemfraudulenta/">
                    Mensagens
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link text-light" href="/quiz/">
                    Quiz
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link text-light" href="/dicaseguranca/">
                    Dicas
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link text-light" href="/denuncia/">
                    Denúncias
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link text-light" href="/notificacao/">
                    Notificações
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link text-light" href="/admin/">
                    Administração
                </a>
            </li>

        </ul>

    </div>

</nav>

<div class="container mt-5">

    <h2 class="mb-4">
        Tabela de Quizzes
    </h2>

    <table class="table table-striped table-bordered">

        <thead class="thead-dark">

            <tr>
                <th>Título</th>
                <th>Descrição</th>
            </tr>

        </thead>

        <tbody>

            {% for quiz in quizzes %}

            <tr>
                <td>{{ quiz.titulo }}</td>
                <td>{{ quiz.descricao }}</td>
            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.1/dist/umd/popper.min.js"></script>

<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>

</html>
