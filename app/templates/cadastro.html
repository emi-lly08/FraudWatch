<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Cadastro - FraudWatch</title>

    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>

<body style="background-color:#f5f7fa;">

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-danger text-white text-center">

                    <h3>FraudWatch</h3>

                    <p>Criar Conta</p>

                </div>

                <div class="card-body">

                    <form method="post">

                        {% csrf_token %}

                        <div class="form-group">
                            <label>Nome</label>

                            <input type="text"
                                   name="nome"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="form-group">
                            <label>Email</label>

                            <input type="email"
                                   name="email"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="form-group">
                            <label>Senha</label>

                            <input type="password"
                                   name="senha"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="form-group">
                            <label>Idade</label>

                            <input type="number"
                                   name="idade"
                                   class="form-control"
                                   required>
                        </div>

                        <button type="submit"
                                class="btn btn-danger btn-block">

                            Cadastrar

                        </button>

                    </form>

                    <hr>

                    <a href="/login/"
                       class="btn btn-secondary btn-block">

                        Já tenho conta

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
