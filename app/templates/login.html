<!DOCTYPE html>

<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FraudWatch</title>


<link rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">


</head>

<body style="background-color:#f5f7fa;">

<div class="container">


<div class="row justify-content-center mt-5">

    <div class="col-md-5">

        <div class="card shadow">

            <div class="card-header bg-danger text-white text-center">
                <h3>FraudWatch</h3>
                <p>Login do Sistema</p>
            </div>

            <div class="card-body">

                <form method="post">

                    {% csrf_token %}

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email"
                               name="email"
                               class="form-control"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password"
                               name="senha"
                               class="form-control"
                               required>
                    </div>

                    <button type="submit"
                            class="btn btn-danger btn-block">
                        Entrar
                    </button>

                </form>

                <hr>

                <a href="/cadastro/"
                   class="btn btn-secondary btn-block">
                    Criar Conta
                </a>

                {% if erro %}
                <div class="alert alert-danger mt-3">
                    {{ erro }}
                </div>
                {% endif %}

            </div>

        </div>

    </div>

</div>


</div>

</body>
</html>
